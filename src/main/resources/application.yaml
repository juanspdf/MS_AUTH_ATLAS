# ============================================================
# MSAUTENTICACION - Microservicio de Autenticación ATLAS
# ============================================================

server:
  port: 8081
  servlet:
    context-path: /ms-autenticacion

# ============================================================
# SPRING DATASOURCE - PostgreSQL
# ============================================================
spring:
  application:
    name: msautenticacion

  datasource:
    url: jdbc:postgresql://localhost:5432/atlas_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: usr
    open-in-view: false

  # ============================================================
  # SPRING MAIL - SMTP Configuration
  # ============================================================
  # Configurar con las credenciales de tu servidor SMTP.
  # Gmail requiere App Password: https://myaccount.google.com/apppasswords
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:tu-correo@gmail.com}
    password: ${SMTP_PASSWORD:tu-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enabled: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ============================================================
# JWT CONFIGURATION
# ============================================================
jwt:
  secret: Z2FpYS1hdGxhcy1tc2F1dGVudGljYWNpb24tc2VjcmV0LWtleS1wcm9kdWNjaW9uLTIwMjQtc2lzdGVtYXMtZ2FpYS1zdXBlci1zZWNyZXQ=
  expiration: 86400000  # 24 horas en milisegundos

# ============================================================
# SPRINGDOC / SWAGGER
# ============================================================
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# ============================================================
# ACTUATOR
# ============================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: msautenticacion
    description: Microservicio de Autenticación y Autorización - Sistema ATLAS
    version: 0.0.1-SNAPSHOT

# ============================================================
# LOGGING
# ============================================================
logging:
  level:
    com.sistemasgaia.atlas.msautenticacion: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

# ============================================================
# ATLAS - Configuración de la aplicación
# ============================================================
atlas:
  frontend:
    base-url: ${FRONTEND_URL:http://localhost:4200}
  email:
    from: ${EMAIL_FROM:noreply@sistemasgaia.com}
    from-name: ${EMAIL_FROM_NAME:Sistema ATLAS}
  activacion:
    token-expiration-hours: ${TOKEN_EXPIRATION_HOURS:24}
